spring.application.name=crossword
app.python.script.path=src/puzzle_gen/puzzle_generator.py
app.python.command=${CROSSWORD_PYTHON_COMMAND:python3}
app.daily.default-theme=daily mini crossword

spring.datasource.url=jdbc:sqlite:${CROSSWORD_DB_PATH:./crosswords.sqlite}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
